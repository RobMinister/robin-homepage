<!DOCTYPE html>
<html>
<head>
<title>Robin Sharma</title>

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(120deg,#22c55e,#3b82f6,#8b5cf6,#ec4899);
  background-size:300% 300%;
  animation:bg 10s ease infinite;
  font-family:system-ui;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  text-align:center;
}

h1{
  color:white;
  font-size:52px;
  margin-bottom:50px;
}

.cards{
  display:flex;
  gap:40px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  width:300px;
  background:white;
  padding:35px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  text-align:center;
  transition:all .3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

img{
  width:180px;
  margin-bottom:20px;
}

p{
  color:#475569;
  font-size:16px;
}

button{
  margin-top:20px;
  padding:14px 26px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#22c55e,#3b82f6);
  color:white;
  cursor:pointer;
  transition:all .25s;
}

button:hover{
  transform:scale(1.08);
}

.contact{
  margin-top:60px;
  color:white;
  font-size:18px;
}

.contact a{
  color:#fff;
  font-weight:bold;
  text-decoration:none;
}

.contact a:hover{
  text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h1>Robin Sharma</h1>

<div class="cards">

<div class="card">
<img src="solemate.png">
<h3>SoleMate</h3>
<p>Monthly step challenge with leaderboard.</p>
<a href="https://solemate.robin-sharma.com">
<button>Open SoleMate</button>
</a>
</div>

<div class="card">
<img src="portfolio.png">
<h3>Portfolio</h3>
<p>View my projects, work, and experience.</p>
<a href="https://portfolio.robin-sharma.com">
<button>Open Portfolio</button>
</a>
</div>

</div>

<div class="contact">
Contact me at  
<a href="mailto:help@robin-sharma.com">help@robin-sharma.com</a>
</div>

</div>

</body>
</html>
